# client/nginx.conf
# Nginx config for the ShiftSense React SPA
#
# Two responsibilities:
#   1. Serve the Vite build with fallback to index.html (React Router)
#   2. Proxy /api/v1 to the Express server so the browser never
#      crosses origins — avoids CORS in production entirely

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Cache static assets aggressively (Vite adds content hashes) ────────
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy — forward to Express server ──────────────────────────────
    location /api/v1 {
        proxy_pass         http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";  # WebSocket support
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── React Router fallback — all unknown paths → index.html ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
}
